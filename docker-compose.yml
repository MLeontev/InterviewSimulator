services:
  frontend:
    image: interviewsimulator-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3000:80'
    depends_on:
      - api

  api:
    image: interviewsimulator-api
    build:
      context: .
      dockerfile: InterviewSimulator.API/Dockerfile
    user: "0:0"
    ports:
      - '8090:8080'
      - '8091:8081'
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Port=5432;User Id=postgres;Password=postgres;Database=InterviewSimulator;
      - CODE_EXECUTION_TEMP_ROOT=${PWD}/.code-exec-tmp
      - CODE_EXECUTION_DOCKER_PLATFORM=linux/amd64
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}:${PWD}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: InterviewSimulator
    volumes:
      - pg-data:/var/lib/postgresql
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  pg-data:
