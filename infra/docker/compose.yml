name: interviewsimulator

services:
  frontend:
    image: interviewsimulator-frontend
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    restart: unless-stopped

  api:
    image: interviewsimulator-api
    build:
      context: ../../backend/src
      dockerfile: InterviewSimulator.API/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Port=5432;User Id=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=${POSTGRES_DB}
      - CODE_EXECUTION_TEMP_ROOT=/app/.code-exec-tmp
      - CODE_EXECUTION_HOST_TEMP_ROOT=${HOST_CODE_EXECUTION_ROOT}
      - Keycloak__ConfidentialClientId=${KEYCLOAK_CONFIDENTIAL_CLIENT_ID}
      - Keycloak__ConfidentialClientSecret=${KEYCLOAK_CONFIDENTIAL_CLIENT_SECRET}
      - GigaChat__Auth__ClientId=${GIGACHAT_CLIENT_ID}
      - GigaChat__Auth__ClientSecret=${GIGACHAT_CLIENT_SECRET}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_CODE_EXECUTION_ROOT}:/app/.code-exec-tmp
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:26.6
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ../keycloak/themes:/opt/keycloak/themes
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg-data:
  keycloak-data:
