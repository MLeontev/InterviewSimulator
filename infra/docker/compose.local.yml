services:
  frontend:
    build:
      args:
        VITE_KEYCLOAK_URL: http://localhost:8082
    ports:
      - '3000:80'

  api:
    ports:
      - '8090:8080'
      - '8091:8081'
    env_file:
      - ../env/.env.local

  db:
    ports:
      - '5433:5432'

  keycloak:
    command:
      - start-dev
      - --spi-theme-cache-themes=false
      - --spi-theme-cache-templates=false
      - --spi-theme-static-max-age=-1
    ports:
      - '8082:8080'
    env_file:
      - ../env/.env.local
