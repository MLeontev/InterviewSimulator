name: CI/CD Pipeline

on:
  push:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose up -d --build

      - name: Run integration tests (Postman)
        run: |
          npm install -g newman
          newman run postman/integration-tests.json \
            -e postman/ci-env.json

      - name: Shutdown services
        if: always()
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        run: |
          docker build -t leontevma/interviewsimulator-api:latest -f InterviewSimulator.API/Dockerfile .
          docker push leontevma/interviewsimulator-api:latest

      - name: Build and push Frontend image
        run: |
          docker build -t leontevma/interviewsimulator-frontend:latest ./frontend
          docker push leontevma/interviewsimulator-frontend:latest
